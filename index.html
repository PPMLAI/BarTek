<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Chat Tim Teknisi LAI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
background:#0d2d50;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{

width:95%;
max-width:900px;
height:95vh;
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0px 10px 30px rgba(0,0,0,.4);

display:flex;
flex-direction:column;

}

.header{

background:#003f87;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;

}

.header h2{

font-size:25px;

}

.online{

background:limegreen;
padding:6px 12px;
border-radius:20px;
font-weight:bold;

}

.chat{

flex:1;
padding:20px;
overflow-y:auto;
background:#eef4fb;

}

.message{

background:white;
padding:12px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 2px 5px rgba(0,0,0,.1);

}

.name{

font-weight:bold;
color:#0056b3;

}

.time{

float:right;
font-size:12px;
color:gray;

}

.text{

margin-top:8px;

}

.footer{

padding:15px;
display:flex;
gap:10px;
background:white;

}

input{

flex:1;
padding:12px;
border-radius:8px;
border:1px solid silver;
font-size:16px;

}

button{

padding:12px 20px;
background:#0056b3;
color:white;
border:none;
border-radius:8px;
cursor:pointer;

}

button:hover{

background:#003d82;

}

.login{

position:absolute;
width:100%;
height:100%;
background:#003f87;

display:flex;
justify-content:center;
align-items:center;

}

.login-box{

background:white;
padding:30px;
border-radius:15px;
width:350px;
text-align:center;

}

.login-box h1{

margin-bottom:20px;

}

.login-box input{

width:100%;
margin-top:15px;

}

.login-box button{

width:100%;
margin-top:20px;

}

.dark{

background:#111;

}

.dark .chat{

background:#222;

}

.dark .message{

background:#333;
color:white;

}

.dark .footer{

background:#111;

}

.dark input{

background:#222;
color:white;

}

</style>
</head>

<body>

<div class="login" id="login">

<div class="login-box">

<h1>LOGIN TEKNISI LAI</h1>

<input id="nama" placeholder="Nama Teknisi">

<button onclick="masuk()">Masuk</button>

</div>

</div>

<div class="container">

<div class="header">

<h2>💬 TIM TEKNISI LAI</h2>

<div>

<span class="online">● Online</span>

<button onclick="darkMode()">🌙</button>

</div>

</div>

<div class="chat" id="chat">

</div>

<div class="footer">

<button onclick="emoji()">😀</button>

<input id="pesan" placeholder="Tulis pesan...">

<input type="file" id="gambar" accept="image/*">

<button onclick="kirim()">Kirim</button>

</div>

</div>

<audio id="suara">

<source src="https://actions.google.com/sounds/v1/cartoon/pop.ogg">

</audio>

<script>

let user="";

let chat=JSON.parse(localStorage.getItem("chat"))||[];

function masuk(){

user=document.getElementById("nama").value;

if(user=="") return;

document.getElementById("login").style.display="none";

tampil();

}

function tampil(){

let html="";

chat.forEach(x=>{

html+=`
<div class="message">

<div class="name">

${x.nama}

<span class="time">${x.jam}</span>

</div>

<div class="text">

${x.text}

</div>

</div>

`;

});

document.getElementById("chat").innerHTML=html;

document.getElementById("chat").scrollTop=999999;

}

function kirim(){

let isi=document.getElementById("pesan").value;

if(isi=="") return;

let jam=new Date().toLocaleTimeString();

chat.push({

nama:user,

text:isi,

jam:jam

});

localStorage.setItem("chat",JSON.stringify(chat));

document.getElementById("pesan").value="";

document.getElementById("suara").play();

tampil();

}

function emoji(){

document.getElementById("pesan").value+="😀";

}

function darkMode(){

document.body.classList.toggle("dark");

}

setInterval(tampil,1000);

</script>

</body>
</html>
