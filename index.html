<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Control PPM LAI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#eef3f8;padding:20px}
.container{max-width:1200px;margin:auto}
.header{
    background:#0b5ed7;
    color:#fff;
    padding:15px;
    border-radius:10px;
    text-align:center;
    margin-bottom:20px;
}
.form{
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,.15);
}
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:10px;
}
input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}
button{
    margin-top:15px;
    padding:10px 20px;
    background:#0b5ed7;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
button:hover{
    background:#084298;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    background:white;
}
th{
    background:#0b5ed7;
    color:white;
    padding:10px;
}
td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}
.search{
    margin-top:20px;
}
</style>

</head>

<body>

<div class="container">

<div class="header">
<h2>Stock Barang Ruang Teknisi PPM LAI</h2>
</div>

<div class="form">

<div class="grid">

<input id="nama" placeholder="Nama Barang">

<input id="tipe" placeholder="Tipe Barang">

<input id="mesin" placeholder="Untuk Mesin">

<input id="awal" type="number" placeholder="Stock Awal">

<input id="tambah" type="number" value="0" placeholder="Tambah Stock">

<input id="kurang" type="number" value="0" placeholder="Pengurangan">

<input id="tanggal" type="date">

</div>

<button onclick="simpan()">Simpan Data</button>

</div>

<input class="search" id="cari" placeholder="Cari Barang..." onkeyup="filterData()">

<table>

<thead>

<tr>

<th>No</th>
<th>Nama Barang</th>
<th>Tipe</th>
<th>Mesin</th>
<th>Stock Awal</th>
<th>Tambah</th>
<th>Pengurangan</th>
<th>Tanggal</th>
<th>Sisa Stock</th>

</tr>

</thead>

<tbody id="tbody">

</tbody>

</table>

</div>

<script>

// GANTI DENGAN URL WEB APP APPS SCRIPT
const API_URL="https://script.google.com/macros/s/AKfycbyblchdCwIFyxP64wx9CmGt27Av951rplGPd0N_GUyWslt6bO1tsg6GCEowq3o9lX7H/exec";

let data=[];

async function loadData(){

const res=await fetch(API_URL+"?action=read");

data=await res.json();


tampil();

}

function formatTanggalIndonesia(tanggal) {
  if (!tanggal) return "";

  // Jika tanggal dikirim dalam format ISO string dari Apps Script atau DB (misal ada huruf T atau Z)
  // Kita bersihkan agar fokus ke bagian YYYY-MM-DD saja
  if (typeof tanggal === 'string' && tanggal.includes('T')) {
    tanggal = tanggal.split('T')[0];
  }

  const d = new Date(tanggal);

  // Fallback jika objek Date gagal parsing format tertentu
  if (isNaN(d)) {
    const p = tanggal.split("-");
    if (p.length === 3) {
      // Mengatasi format YYYY-MM-DD atau DD-MM-YYYY secara manual
      if(p[0].length === 4) return `${p[2]}/${p[1]}/${p[0]}`; // YYYY-MM-DD -> DD/MM/YYYY
      return `${p[0]}/${p[1]}/${p[2]}`; // DD-MM-YYYY -> DD/MM/YYYY
    }
    return tanggal;
  }

  return d.toLocaleDateString("id-ID", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric"
  });
}

function tampil(){

let html="";

data.forEach((d,i)=>{

// Memanggil fungsi formatTanggalIndonesia pada indeks kolom tanggal d[7]
let tanggalDiformat = formatTanggalIndonesia(d[7]);

html+=`
<tr>

<td>${i+1}</td>

<td>${d[1]}</td>

<td>${d[2]}</td>

<td>${d[3]}</td>

<td>${d[4]}</td>

<td>${d[5]}</td>

<td>${d[6]}</td>

<td>${tanggalDiformat}</td>

<td>${d[8]}</td>

</tr>
`;

});

tbody.innerHTML=html;

}

async function simpan(){

const awalStock=Number(awal.value);
const tambahStock=Number(tambah.value);
const kurangStock=Number(kurang.value);

const obj={

action:"add",

nama:nama.value,

tipe:tipe.value,

mesin:mesin.value,

awal:awalStock,

tambah:tambahStock,

kurang:kurangStock,

tanggal:tanggal.value,

sisa:awalStock+tambahStock-kurangStock

};

await fetch(API_URL,{

method:"POST",

body:JSON.stringify(obj)

});

bersih();

loadData();

}

function bersih(){

document.querySelectorAll("input").forEach(i=>{

if(i.type!="number")
i.value="";

});

awal.value="";
tambah.value=0;
kurang.value=0;

}

function filterData(){

let key=cari.value.toLowerCase();

let rows=document.querySelectorAll("#tbody tr");

rows.forEach(r=>{

let nama=r.cells[1].innerText.toLowerCase();

r.style.display=nama.includes(key)?"":"none";

});

}

loadData();

</script>

</body>
</html>
